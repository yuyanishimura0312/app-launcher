<link rel="icon" href="https://esse-sense.com/favicon.ico">
<style>

  }

  }
  .stat-dot {

  }

  }

    border-radius: 8px;
    color: #1a1a1a;
    font-size: 14px;

    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: #c87864; }
  .search-bar input::placeholder { color: #9a918a; }

    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 48px;
  }
  .section {
    margin-bottom: 28px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 0 0 10px;
    border-bottom: 1px solid #e8e2da;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .section-indicator {

    height: 10px;
    border-radius: 50%;

  }
  .section-title.released { color: #2e7d32; }

  .section-title.local .section-indicator { background: #e65100; }
  .section-title.cli { color: #5c534b; }
  .section-title.cli .section-indicator { background: #78716c; }
  .section-title.infra { color: #475569; }
  .section-title.infra .section-indicator { background: #475569; }
  .section-title.archived { color: #9a918a; }

  .app-card {

    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }

  .app-card.archived-card { opacity: 0.55; }
  .app-card.archived-card:hover { opacity: 0.75; }
  .app-icon {

    height: 40px;

    font-weight: 700;

    color: #fff;

  .app-name {

    font-weight: 500;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 8px;

    gap: 6px;

    border: none;

    transition: all 0.15s;

    display: inline-flex;

// --- Archive state persistence ---
const STORAGE_KEY = 'app-launcher-archived';

function loadArchivedSet() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return new Set(JSON.parse(saved));
  } catch (e) {}
  // Initialize with default archived apps
  const defaults = new Set();
  apps.forEach(app => { if (app.defaultArchived) defaults.add(app.name); });
  return defaults;
}

function saveArchivedSet(set) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
}

let archivedSet = loadArchivedSet();

function toggleArchive(appName) {
  if (archivedSet.has(appName)) {
    archivedSet.delete(appName);
  } else {
    archivedSet.add(appName);
  }
  saveArchivedSet(archivedSet);
  renderApps(document.getElementById('search').value);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyCmd(cmd, btn) {
  navigator.clipboard.writeText(cmd).then(() => {
    btn.classList.add('copied');
    btn.textContent = 'コピー済';
    showToast('コピー済: ' + cmd);
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'コピー'; }, 2000);
  });
}

function renderApps(filter = '') {
  const container = document.getElementById('app-list');
  container.innerHTML = '';
  const lf = filter.toLowerCase();

  // Split apps into active and archived
  const activeCategories = {};
  const activeCategoryMeta = {};
  const archivedApps = [];

  apps.forEach(app => {
    if (lf && !app.name.toLowerCase().includes(lf) && !app.desc.toLowerCase().includes(lf) && !app.category.toLowerCase().includes(lf)) return;

    if (archivedSet.has(app.name)) {
      archivedApps.push(app);
    } else {
      if (!activeCategories[app.category]) {
        activeCategories[app.category] = [];
        activeCategoryMeta[app.category] = app.sectionType;
      }
      activeCategories[app.category].push(app);
    }
  });

  // Render active categories
  Object.entries(activeCategories).forEach(([cat, items]) => {
    const section = document.createElement('div');
    section.className = 'section';
    const sectionType = activeCategoryMeta[cat] || '';
    const count = items.length;
    section.innerHTML = `<div class="section-title ${sectionType}"><span class="section-indicator"></span>${cat} <span style="font-weight:400;opacity:0.6">(${count})</span></div>`;
    items.forEach(app => section.appendChild(buildCard(app, false)));
    container.appendChild(section);
  });

  // Render archived section
  if (archivedApps.length > 0) {
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<div class="section-title archived"><span class="section-indicator"></span>アーカイブ済み <span style="font-weight:400;opacity:0.6">(${archivedApps.length})</span></div>`;
    archivedApps.forEach(app => section.appendChild(buildCard(app, true)));
    container.appendChild(section);
  }

  if (Object.keys(activeCategories).length === 0 && archivedApps.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#666;padding:40px">該当するアプリが見つかりません</p>';
  }
}

function buildCard(app, isArchived) {
  const card = document.createElement('div');
  card.className = isArchived ? 'app-card archived-card' : 'app-card';

  let credHtml = '';
  if (app.localNote) credHtml += `<div class="cred-row">${app.localNote}</div>`;

  let metaHtml = '';
  if (app.hosting) metaHtml = `<div class="app-meta">${app.hosting}</div>`;

  let actionsHtml = '';
  if (app.url) {
    actionsHtml += `<a href="${app.url}" target="_blank" class="btn btn-open" onclick="event.stopPropagation()">開く</a>`;
  }
  if (app.localUrl && !app.url) {
    actionsHtml += `<a href="${app.localUrl}" target="_blank" class="btn btn-open" onclick="event.stopPropagation()">開く</a>`;
  }
  if (app.admin) {
    actionsHtml += `<a href="${app.admin}" target="_blank" class="btn btn-admin" onclick="event.stopPropagation()">管理</a>`;
  }
  if (app.setup) {
    actionsHtml += `<a href="${app.setup}" target="_blank" class="btn btn-admin" onclick="event.stopPropagation()" style="background:#5a6b7a">Setup</a>`;
  }
  if (app.localCmd) {
    actionsHtml += `<button class="btn btn-copy" onclick="event.stopPropagation(); copyCmd('${app.localCmd.replace(/'/g, "\\'")}', this)">コピー</button>`;
  }
  if (app.pestle) {
    actionsHtml += `<button class="btn btn-copy" onclick="event.stopPropagation(); copyCmd('${app.pestle.replace(/'/g, "\\'")}', this)" title="PESTLE mode">PESTLE</button>`;
  }

  // Archive/restore toggle
  const archiveBtnLabel = isArchived ? '復元' : 'アーカイブ';
  actionsHtml += `<button class="btn btn-archive" onclick="event.stopPropagation(); toggleArchive('${app.name.replace(/'/g, "\\'")}')">${archiveBtnLabel}</button>`;

  const badgeHtml = isArchived
    ? `<span class="badge archived-badge">アーカイブ</span>`
    : `<span class="badge ${app.badgeType}">${app.badge}</span>`;

  card.innerHTML = `
    <div class="app-icon" style="background:${app.color}">${app.icon}</div>
    <div class="app-info">
      <div class="app-name">${app.name} ${badgeHtml}</div>
      <div class="app-desc">${app.desc}</div>
      ${metaHtml}
      ${credHtml}
    </div>
    <div class="app-actions">${actionsHtml}</div>
  `;

  card.addEventListener('click', () => {
    if (app.url) window.open(app.url, '_blank');
    else if (app.localUrl) window.open(app.localUrl, '_blank');
    else if (app.localCmd) {
      navigator.clipboard.writeText(app.localCmd);
      showToast('コピー済: ' + app.localCmd);
    }
  });

  return card;
}

document.getElementById('search').addEventListener('input', e => renderApps(e.target.value));

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    renderApps();
  }
});

renderApps();
</script>
</body>
</html>
