<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Launcher</title>
<link rel="icon" href="https://esse-sense.com/favicon.ico">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #faf8f5;
    color: #1a1a1a;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .header {
    padding: 32px 24px 16px;
    max-width: 960px;
    margin: 0 auto;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #783c28;
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 13px;
    color: #6b635b;
    margin-top: 4px;
  }
  .stats {
    display: flex;
    gap: 16px;
    margin-top: 12px;
  }
  .stat {
    font-size: 12px;
    color: #5c534b;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .search-bar {
    max-width: 960px;
    margin: 0 auto;
    padding: 8px 24px 16px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 16px;
    background: #fff;
    border: 1px solid #e8e2da;
    border-radius: 8px;
    color: #1a1a1a;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: #c87864; }
  .search-bar input::placeholder { color: #9a918a; }
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 48px;
  }
  .section {
    margin-bottom: 28px;
    scroll-margin-top: 52px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 0 0 10px;
    border-bottom: 1px solid #e8e2da;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .section-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-title.released { color: #2e7d32; }
  .section-title.released .section-indicator { background: #2e7d32; }
  .section-title.local { color: #96503a; }
  .section-title.local .section-indicator { background: #e65100; }
  .section-title.cli { color: #5c534b; }
  .section-title.cli .section-indicator { background: #78716c; }
  .section-title.infra { color: #475569; }
  .section-title.infra .section-indicator { background: #475569; }
  .section-title.agent { color: #7c3aed; }
  .section-title.agent .section-indicator { background: #7c3aed; }
  .section-title.archived { color: #9a918a; }
  .section-title.archived .section-indicator { background: #bbb; }
  .app-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .app-card:hover { background: #f3efe9; }
  .app-card:active { background: #ece6dd; }
  .btn:active { transform: scale(0.96); }
  .app-card.archived-card { opacity: 0.55; }
  .app-card.archived-card:hover { opacity: 0.75; }
  .app-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
  }
  .app-info { flex: 1; min-width: 0; }
  .app-name {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-name .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .badge.released {
    background: #e6f4e6;
    color: #1b5e20;
  }
  .badge.local {
    background: #fff3e0;
    color: #e65100;
  }
  .badge.cli {
    background: #f3efe9;
    color: #57534e;
  }
  .badge.infra {
    background: #e3f2fd;
    color: #1565c0;
  }
  .badge.agent {
    background: #ede9fe;
    color: #7c3aed;
  }
  .badge.dev {
    background: #fce4ec;
    color: #c62828;
  }
  .badge.archived-badge {
    background: #f0ede8;
    color: #9a918a;
  }
  .app-desc {
    font-size: 12px;
    color: #44403c;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .app-meta {
    font-size: 11px;
    color: #6b635b;
    margin-top: 2px;
  }
  .app-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    white-space: nowrap;
    min-width: 44px;
    min-height: 36px;
  }
  .btn:focus-visible {
    outline: 2px solid #783c28;
    outline-offset: 2px;
  }
  .btn-open {
    background: #783c28;
    color: #fff;
  }
  .btn-open:hover { background: #4a2418; }
  .btn-admin {
    background: #c87864;
    color: #fff;
  }
  .btn-admin:hover { background: #96503a; }
  .btn-copy {
    background: #fff;
    color: #5c534b;
    border: 1px solid #e8e2da;
  }
  .btn-copy:hover { background: #f3efe9; color: #1a1a1a; }
  .btn-copy.copied {
    background: #e6f4e6;
    color: #2e7d32;
    border-color: #a5d6a7;
  }
  .btn-archive {
    background: #fff;
    color: #9a918a;
    border: 1px solid #e8e2da;
    font-size: 11px;
    padding: 4px 8px;
  }
  .btn-archive:hover { background: #f3efe9; color: #5c534b; }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #4a2418;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .hidden { display: none !important; }
  .cred-row {
    font-size: 11px;
    color: #6b635b;
    margin-top: 2px;
  }
  .cred-row span {
    color: #5c534b;
    font-family: 'SF Mono', 'Menlo', monospace;
    background: #f3efe9;
    padding: 1px 5px;
    border-radius: 3px;
    user-select: all;
  }
  .integrated-in {
    font-size: 11px;
    color: #7c3aed;
    margin-top: 2px;
  }
  .integrated-in .app-tag {
    display: inline-block;
    background: #ede9fe;
    color: #6d28d9;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    margin-right: 4px;
  }
  .archive-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 11px;
    font-weight: 400;
    color: #9a918a;
    cursor: pointer;
  }
  .archive-toggle:hover { color: #5c534b; }

  /* Category jump nav - mobile only */
  .category-nav {
    display: none;
  }
  @media (max-width: 640px) {
    .category-nav {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(250, 248, 245, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid #e8e2da;
      scrollbar-width: none;
    }
    .category-nav::-webkit-scrollbar { display: none; }
    .category-nav button {
      white-space: nowrap;
      padding: 6px 12px;
      border-radius: 16px;
      border: 1px solid #e8e2da;
      background: #fff;
      font-size: 11px;
      font-weight: 500;
      color: #5c534b;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 32px;
    }
    .category-nav button:active,
    .category-nav button.active {
      background: #783c28;
      color: #fff;
      border-color: #783c28;
    }
  }

  /* ============================================
     Responsive Design
     ============================================ */

  /* --- Tablet & small desktop (max 768px) --- */
  @media (max-width: 768px) {
    .app-desc {
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .app-actions {
      flex-wrap: wrap;
      gap: 6px;
    }
  }

  /* --- Mobile (max 640px) --- */
  @media (max-width: 640px) {
    .header {
      padding: 20px 16px 12px;
    }
    .header h1 { font-size: 18px; }
    .header p { font-size: 12px; }
    .stats {
      flex-wrap: wrap;
      gap: 6px 12px;
    }
    .stat { font-size: 11px; }
    .search-bar {
      padding: 8px 16px 12px;
    }
    .search-bar input {
      font-size: 16px; /* prevent iOS auto-zoom on focus */
      padding: 10px 14px;
    }
    .container {
      padding: 0 12px 32px;
    }
    .section { margin-bottom: 20px; }
    .section-title { font-size: 11px; }

    /* Card: icon left (absolute), info + actions stacked right */
    .app-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 12px 12px 12px 54px;
      gap: 6px;
      border-radius: 8px;
      cursor: default;
      -webkit-tap-highlight-color: transparent;
    }
    .app-icon {
      position: absolute;
      left: 10px;
      top: 12px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      border-radius: 8px;
    }
    .app-info {
      width: 100%;
      min-width: 0;
      flex: none;
    }
    .app-name { font-size: 13px; gap: 6px; }
    .app-name .badge { font-size: 9px; padding: 1px 5px; }
    .app-desc {
      font-size: 11px;
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .app-meta { font-size: 10px; }

    /* Actions: full width, wrap */
    .app-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      width: 100%;
      flex-shrink: 1;
    }
    .btn {
      padding: 7px 12px;
      font-size: 12px;
      min-height: 36px;
      border-radius: 6px;
    }
    .btn-archive {
      font-size: 10px;
      padding: 5px 8px;
      min-height: 30px;
      min-width: auto;
      opacity: 0.5;
      margin-left: auto;
    }

    /* Extra info rows */
    .cred-row { font-size: 10px; }
    .integrated-in { font-size: 10px; }
    .integrated-in .app-tag { font-size: 9px; }

    /* Toast at bottom, avoid overlap with thumb zone */
    .toast {
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      font-size: 12px;
      padding: 8px 16px;
      max-width: calc(100vw - 32px);
    }
  }

  /* --- Narrow mobile (max 380px) --- */
  @media (max-width: 380px) {
    .header { padding: 16px 12px 10px; }
    .search-bar { padding: 6px 12px 10px; }
    .container { padding: 0 8px 24px; }

    .app-card {
      padding: 10px 10px 10px 44px;
    }
    .app-icon {
      left: 8px;
      top: 10px;
      width: 30px;
      height: 30px;
      font-size: 13px;
    }
    .app-name { font-size: 12px; }
    .app-desc { font-size: 11px; -webkit-line-clamp: 1; }
    .app-meta { display: none; }
    .btn { padding: 6px 8px; font-size: 11px; min-height: 34px; min-width: 36px; }
    .btn-archive { padding: 5px 8px; font-size: 10px; min-height: 30px; }
  }

  /* ============================================
     Dev State (Next Action + RAG) - 開発リマインダー機能
     ============================================ */
  .dev-state {
    margin-top: 6px;
    padding: 6px 0 0;
    border-top: 1px dashed #ece6dd;
    font-size: 12px;
    color: #44403c;
    line-height: 1.4;
  }
  .dev-state-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .dev-rag-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }
  .dev-rag-green { background: #2e7d32; }
  .dev-rag-amber { background: #e69500; }
  .dev-rag-red { background: #c5463a; }
  .dev-rag-gray { background: #c4bdb3; }
  .dev-next-action {
    flex: 1;
    min-width: 0;
    color: #1a1a1a;
    font-weight: 500;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.15s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dev-next-action:hover { background: #f3efe9; }
  .dev-next-action.empty {
    color: #6b635b;
    font-style: italic;
    font-weight: 400;
  }
  .dev-last-touched {
    font-size: 11px;
    color: #6b635b;
    flex-shrink: 0;
  }
  .dev-status-pill {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: #f3efe9;
    color: #6b635b;
  }
  .dev-status-pill.paused { background: #fff3e0; color: #e65100; }

  /* Focus section - 注目（再開すべきアプリ） */
  .focus-section {
    max-width: 960px;
    margin: 0 auto 8px;
    padding: 12px 24px;
    background: #fdf6f3;
    border: 1px solid #f0d7ce;
    border-radius: 10px;
    margin-left: 24px;
    margin-right: 24px;
  }
  .focus-section.empty { display: none; }
  .focus-title {
    font-size: 11px;
    font-weight: 600;
    color: #783c28;
    letter-spacing: 0.3px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .focus-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .focus-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 12px;
    color: #1a1a1a;
  }
  .focus-item:hover { background: #f3efe9; }
  .focus-item-name {
    font-weight: 500;
    flex-shrink: 0;
  }
  .focus-item-action {
    flex: 1;
    min-width: 0;
    color: #44403c;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .focus-item-meta {
    font-size: 11px;
    color: #6b635b;
    flex-shrink: 0;
  }

  /* Settings bar (export/import) */
  .settings-bar {
    max-width: 960px;
    margin: 8px auto 24px;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 11px;
    color: #6b635b;
    flex-wrap: wrap;
  }
  .settings-bar button {
    background: #fff;
    border: 1px solid #e8e2da;
    color: #5c534b;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .settings-bar button:hover { background: #f3efe9; color: #1a1a1a; }
  .settings-bar .sep { color: #c4bdb3; }

  /* Editor modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 26, 0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 16px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 16px 48px rgba(26, 26, 26, 0.18);
  }
  .modal-header {
    padding: 18px 20px 12px;
    border-bottom: 1px solid #f0ede8;
  }
  .modal-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
  }
  .modal-subtitle {
    font-size: 11px;
    color: #6b635b;
    margin-top: 2px;
  }
  .modal-body {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .modal-field { display: flex; flex-direction: column; gap: 6px; }
  .modal-field label {
    font-size: 11px;
    font-weight: 600;
    color: #44403c;
    letter-spacing: 0.3px;
  }
  .modal-field input[type="text"],
  .modal-field textarea {
    padding: 8px 10px;
    border: 1px solid #e8e2da;
    border-radius: 6px;
    font-size: 14px;
    color: #1a1a1a;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    background: #fff;
  }
  .modal-field textarea {
    min-height: 70px;
    resize: vertical;
    line-height: 1.5;
  }
  .modal-field input[type="text"]:focus,
  .modal-field textarea:focus { border-color: #c87864; }
  .modal-field .hint {
    font-size: 10px;
    color: #9a918a;
  }
  .status-radios {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .status-radio {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    border: 1px solid #e8e2da;
    border-radius: 16px;
    cursor: pointer;
    font-size: 12px;
    color: #5c534b;
  }
  .status-radio input { margin: 0; }
  .status-radio.checked {
    background: #fdf6f3;
    border-color: #c87864;
    color: #783c28;
  }
  .modal-footer {
    padding: 12px 20px 18px;
    border-top: 1px solid #f0ede8;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .modal-footer .btn {
    min-width: 80px;
  }
  .btn-save {
    background: #783c28;
    color: #fff;
    border: none;
  }
  .btn-save:hover { background: #4a2418; }
  .btn-cancel {
    background: #fff;
    color: #5c534b;
    border: 1px solid #e8e2da;
  }
  .btn-cancel:hover { background: #f3efe9; }
  .btn-clear {
    background: #fff;
    color: #c5463a;
    border: 1px solid #f0d7ce;
    margin-right: auto;
  }
  .btn-clear:hover { background: #fef2f0; }

  @media (max-width: 640px) {
    .focus-section { margin-left: 12px; margin-right: 12px; padding: 10px 14px; }
    .settings-bar { padding: 0 12px; }
    .dev-state { font-size: 11px; }
    .dev-next-action { font-size: 12px; }
    .modal { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;">
    <div>
      <h1>App Launcher</h1>
      <p>Claude Code で作成したアプリ・エージェント一覧 — 7段階循環開発プロセスで運用</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <a href="futurology.html" style="display:inline-block;padding:8px 14px;background:#783c28;border:1px solid #783c28;border-radius:8px;font-size:12px;color:#fff;text-decoration:none;font-weight:500;white-space:nowrap;transition:background 0.15s;" onmouseover="this.style.background='#4a2418'" onmouseout="this.style.background='#783c28'">未来学データ →</a>
      <a href="vector.html" style="display:inline-block;padding:8px 14px;background:#fff;border:1px solid #e8e2da;border-radius:8px;font-size:12px;color:#783c28;text-decoration:none;font-weight:500;white-space:nowrap;transition:border-color 0.15s;" onmouseover="this.style.borderColor='#c87864'" onmouseout="this.style.borderColor='#e8e2da'">ベクトル空間 →</a>
      <a href="dev-env.html" style="display:inline-block;padding:8px 14px;background:#fff;border:1px solid #e8e2da;border-radius:8px;font-size:12px;color:#783c28;text-decoration:none;font-weight:500;white-space:nowrap;transition:border-color 0.15s;" onmouseover="this.style.borderColor='#c87864'" onmouseout="this.style.borderColor='#e8e2da'">開発環境を見る →</a>
    </div>
  </div>

// ============================================
// Dev State (開発リマインダー) - Phase 1 MVP
// データスキーマ: { version: 1, items: { [appName]: { nextAction, lastTouchedAt, status, pausedReason, notes } } }
// 永続化: localStorage 'app-launcher:dev-state'
// 設計根拠: /tmp/best-practice-report.md 参照
// ============================================
const DEV_STATE_KEY = 'app-launcher:dev-state';
const DEV_STATE_VERSION = 1;
const RAG_AMBER_DAYS = 7;
const RAG_RED_DAYS = 30;
const ACTIVE_SOFT_LIMIT = 7;

let devState = loadDevState();
let saveTimer = null;

function loadDevState() {
  try {
    const raw = localStorage.getItem(DEV_STATE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.items) return parsed;
    }
  } catch (e) {}
  return { version: DEV_STATE_VERSION, items: {} };
}

function saveDevState() {
  // 500ms debounce per BP report
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(DEV_STATE_KEY, JSON.stringify(devState));
    } catch (e) {
      console.error('dev-state save failed', e);
      showToast('保存に失敗しました');
    }
  }, 500);
}

function getDevItem(appName) {
  return devState.items[appName] || null;
}

function setDevItem(appName, patch) {
  const cur = devState.items[appName] || {};
  const next = { ...cur, ...patch };
  if (!next.status) next.status = 'active';
  next.lastTouchedAt = new Date().toISOString();
  devState.items[appName] = next;
  saveDevState();
}

function clearDevItem(appName) {
  delete devState.items[appName];
  saveDevState();
}

function daysSince(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

function ragLevel(item) {
  // returns: 'gray' (no data) / 'green' / 'amber' / 'red'
  if (!item || !item.nextAction || !item.nextAction.trim()) return 'gray';
  if (item.status === 'paused') return 'gray';
  const d = daysSince(item.lastTouchedAt);
  if (d === null) return 'gray';
  if (d < RAG_AMBER_DAYS) return 'green';
  if (d < RAG_RED_DAYS) return 'amber';
  return 'red';
}

function formatRelative(iso) {
  const d = daysSince(iso);
  if (d === null) return '';
  if (d === 0) return '今日';
  if (d === 1) return '昨日';
  if (d < 7) return `${d}日前`;
  if (d < 30) return `${d}日前`;
  if (d < 90) return `${Math.floor(d / 7)}週間前`;
  return 'しばらく前';
}

// ---- Editor modal ----
let editorTarget = null;

function openEditor(appName) {
  editorTarget = appName;
  const item = getDevItem(appName) || {};
  document.getElementById('modal-title').textContent = appName;
  document.getElementById('modal-subtitle').textContent = '次にやることを1つだけ書いてください';
  document.getElementById('ed-next-action').value = item.nextAction || '';
  document.getElementById('ed-notes').value = item.notes || '';
  document.getElementById('ed-paused-reason').value = item.pausedReason || '';
  const status = item.status || 'active';
  document.querySelectorAll('input[name="ed-status"]').forEach(r => {
    r.checked = (r.value === status);
    r.parentElement.classList.toggle('checked', r.checked);
  });
  document.getElementById('ed-paused-reason-field').style.display = (status === 'paused') ? 'flex' : 'none';
  document.getElementById('modal-backdrop').classList.add('show');
  setTimeout(() => document.getElementById('ed-next-action').focus(), 50);
}

function closeEditor() {
  document.getElementById('modal-backdrop').classList.remove('show');
  editorTarget = null;
}

function saveEditor() {
  if (!editorTarget) return;
  const nextAction = document.getElementById('ed-next-action').value.trim();
  const status = document.querySelector('input[name="ed-status"]:checked')?.value || 'active';
  const notes = document.getElementById('ed-notes').value.trim();
  const pausedReason = document.getElementById('ed-paused-reason').value.trim();
  if (!nextAction && !notes && status === 'active') {
    // 全部空 → 削除
    clearDevItem(editorTarget);
  } else {
    setDevItem(editorTarget, { nextAction, status, notes, pausedReason: status === 'paused' ? pausedReason : '' });
  }
  closeEditor();
  renderApps(document.getElementById('search').value);
  checkActiveLimit();
}

function clearEditor() {
  if (!editorTarget) return;
  if (!confirm(`「${editorTarget}」の開発メモを削除しますか？`)) return;
  clearDevItem(editorTarget);
  closeEditor();
  renderApps(document.getElementById('search').value);
}

// ---- Focus section ----
function renderFocusSection() {
  const list = document.getElementById('focus-list');
  const section = document.getElementById('focus-section');
  list.innerHTML = '';
  // Collect amber + red items, sort by oldest first
  const focusable = [];
  for (const [appName, item] of Object.entries(devState.items)) {
    const level = ragLevel(item);
    if (level === 'red' || level === 'amber') {
      focusable.push({ appName, item, level, days: daysSince(item.lastTouchedAt) || 0 });
    }
  }
  if (focusable.length === 0) {
    section.classList.add('empty');
    return;
  }
  focusable.sort((a, b) => b.days - a.days);
  // Limit to top 5 (Zeigarnik moderation - BP report pattern 11)
  focusable.slice(0, 5).forEach(({ appName, item, level, days }) => {
    const div = document.createElement('div');
    div.className = 'focus-item';
    div.innerHTML = `
      <span class="dev-rag-dot dev-rag-${level}"></span>
      <span class="focus-item-name">${escapeHtml(appName)}</span>
      <span class="focus-item-action">${escapeHtml(item.nextAction || '(次のアクション未定)')}</span>
      <span class="focus-item-meta">${formatRelative(item.lastTouchedAt)}</span>
    `;
    div.addEventListener('click', () => openEditor(appName));
    list.appendChild(div);
  });
  section.classList.remove('empty');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---- Stats & soft warning ----
function renderDevStats() {
  let active = 0, paused = 0, total = 0;
  for (const item of Object.values(devState.items)) {
    // Count if either has a nextAction or is explicitly paused
    if (!item.nextAction && item.status !== 'paused') continue;
    total++;
    if (item.status === 'paused') paused++;
    else active++;
  }
  const stats = document.getElementById('dev-stats');
  if (total === 0) {
    stats.textContent = 'メモなし — カードの「次のアクション」をクリックして開始';
  } else {
    stats.textContent = `進行中 ${active} / 一時停止 ${paused}`;
  }
}

function checkActiveLimit() {
  let active = 0;
  for (const item of Object.values(devState.items)) {
    if (item.nextAction && item.status !== 'paused') active++;
  }
  if (active > ACTIVE_SOFT_LIMIT) {
    showToast(`進行中タスクが ${active} 件です。一時停止への退避を検討してください`);
  }
}

// ---- JSON export / import ----
function exportDevState() {
  const blob = new Blob([JSON.stringify(devState, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `app-launcher-dev-state-${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('エクスポート完了');
}

function importDevState(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed || typeof parsed !== 'object' || !parsed.items) throw new Error('invalid format');
      if (!confirm(`${Object.keys(parsed.items).length} 件の開発メモをインポートします。既存データは上書きされます。よろしいですか？`)) return;
      devState = { version: DEV_STATE_VERSION, items: parsed.items };
      saveDevState();
      renderApps(document.getElementById('search').value);
      showToast('インポート完了');
    } catch (err) {
      showToast('読み込み失敗: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// --- Archive state persistence ---
const STORAGE_KEY = 'app-launcher-archived';

function loadArchivedSet() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return new Set(JSON.parse(saved));
  } catch (e) {}
  // Initialize with default archived apps
  const defaults = new Set();
  apps.forEach(app => { if (app.defaultArchived) defaults.add(app.name); });
  return defaults;
}

function saveArchivedSet(set) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
}

let archivedSet = loadArchivedSet();

function toggleArchive(appName) {
  if (archivedSet.has(appName)) {
    archivedSet.delete(appName);
  } else {
    archivedSet.add(appName);
  }
  saveArchivedSet(archivedSet);
  renderApps(document.getElementById('search').value);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyCmd(cmd, btn) {
  navigator.clipboard.writeText(cmd).then(() => {
    btn.classList.add('copied');
    btn.textContent = 'コピー済';
    showToast('コピー済: ' + cmd);
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'コピー'; }, 2000);
  });
}

function renderApps(filter = '') {
  const container = document.getElementById('app-list');
  container.innerHTML = '';
  const lf = filter.toLowerCase();

  // Split apps into active and archived
  const activeCategories = {};
  const activeCategoryMeta = {};
  const archivedApps = [];

  apps.forEach(app => {
    if (lf && !app.name.toLowerCase().includes(lf) && !app.desc.toLowerCase().includes(lf) && !app.category.toLowerCase().includes(lf)) return;

    if (archivedSet.has(app.name)) {
      archivedApps.push(app);
    } else {
      if (!activeCategories[app.category]) {
        activeCategories[app.category] = [];
        activeCategoryMeta[app.category] = app.sectionType;
      }
      activeCategories[app.category].push(app);
    }
  });

  // Build category nav for mobile
  const nav = document.getElementById('category-nav');
  nav.innerHTML = '';
  const catKeys = Object.keys(activeCategories);
  catKeys.forEach((cat, i) => {
    const btn = document.createElement('button');
    // Short labels for nav
    const shortLabels = {
      '公開中の Web アプリ': '公開中',
      'ローカル Web アプリ': 'ローカル',
      'CLI ツール': 'CLI',
      '共有インフラ': '基盤',
      '調査・リサーチ': '調査',
      '経営・日常業務': '経営',
      '開発・品質・デザイン': '開発',
      'コンテンツ・ユーティリティ': 'コンテンツ',
      '研究エージェント': '研究'
    };
    btn.textContent = shortLabels[cat] || cat;
    btn.addEventListener('click', () => {
      const target = document.getElementById('section-' + i);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    nav.appendChild(btn);
  });

  // Render active categories
  Object.entries(activeCategories).forEach(([cat, items], i) => {
    const section = document.createElement('div');
    section.className = 'section';
    section.id = 'section-' + i;
    const sectionType = activeCategoryMeta[cat] || '';
    const count = items.length;
    const shareLink = sectionType === 'agent'
      ? ` <a href="https://yuyanishimura0312.github.io/claude-agent-share/" target="_blank" style="font-size:11px;font-weight:400;color:#7c3aed;text-decoration:underline;margin-left:auto">カタログ / シェア</a>`
      : '';
    section.innerHTML = `<div class="section-title ${sectionType}"><span class="section-indicator"></span>${cat} <span style="font-weight:400;opacity:0.6">(${count})</span>${shareLink}</div>`;
    items.forEach(app => section.appendChild(buildCard(app, false)));
    container.appendChild(section);
  });

  // Render archived section
  if (archivedApps.length > 0) {
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<div class="section-title archived"><span class="section-indicator"></span>アーカイブ済み <span style="font-weight:400;opacity:0.6">(${archivedApps.length})</span></div>`;
    archivedApps.forEach(app => section.appendChild(buildCard(app, true)));
    container.appendChild(section);
  }

  if (Object.keys(activeCategories).length === 0 && archivedApps.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#666;padding:40px">該当するアプリが見つかりません</p>';
  }

  // Update focus section and stats after rendering
  renderFocusSection();
  renderDevStats();
}

function buildCard(app, isArchived) {
  const card = document.createElement('div');
  card.className = isArchived ? 'app-card archived-card' : 'app-card';

  let credHtml = '';
  if (app.localNote) credHtml += `<div class="cred-row">${app.localNote}</div>`;

  let metaHtml = '';
  if (app.hosting) metaHtml = `<div class="app-meta">${app.hosting}</div>`;

  const esc = app.name.replace(/"/g, '&quot;');
  let actionsHtml = '';
  if (app.url) {
    actionsHtml += `<a href="${app.url}" target="_blank" class="btn btn-open" aria-label="${esc} を開く" onclick="event.stopPropagation()">開く</a>`;
  }
  if (app.localUrl && !app.url) {
    actionsHtml += `<a href="${app.localUrl}" target="_blank" class="btn btn-open" aria-label="${esc} を開く" onclick="event.stopPropagation()">開く</a>`;
  }
  if (app.admin) {
    actionsHtml += `<a href="${app.admin}" target="_blank" class="btn btn-admin" aria-label="${esc} の管理画面" onclick="event.stopPropagation()">管理</a>`;
  }
  if (app.setup) {
    actionsHtml += `<a href="${app.setup}" target="_blank" class="btn btn-admin" aria-label="${esc} のセットアップ" onclick="event.stopPropagation()" style="background:#5a6b7a">Setup</a>`;
  }
  if (app.localCmd) {
    actionsHtml += `<button class="btn btn-copy" aria-label="${esc} のコマンドをコピー" onclick="event.stopPropagation(); copyCmd('${app.localCmd.replace(/'/g, "\\'")}', this)">コピー</button>`;
  }
  if (app.pestle) {
    actionsHtml += `<button class="btn btn-copy" aria-label="${esc} のPESTLEコマンドをコピー" onclick="event.stopPropagation(); copyCmd('${app.pestle.replace(/'/g, "\\'")}', this)" title="PESTLE mode">PESTLE</button>`;
  }

  // Archive/restore toggle
  const archiveBtnLabel = isArchived ? '復元' : 'アーカイブ';
  actionsHtml += `<button class="btn btn-archive" aria-label="${esc} を${archiveBtnLabel}" onclick="event.stopPropagation(); toggleArchive('${app.name.replace(/'/g, "\\'")}')">${archiveBtnLabel}</button>`;

  const badgeHtml = isArchived
    ? `<span class="badge archived-badge">アーカイブ</span>`
    : `<span class="badge ${app.badgeType}">${app.badge}</span>`;

  let integratedHtml = '';
  if (app.integratedIn && app.integratedIn.length > 0) {
    const tags = app.integratedIn.map(a => `<span class="app-tag">${a}</span>`).join('');
    integratedHtml = `<div class="integrated-in">組込先: ${tags}</div>`;
  }

  // Dev state (Next Action + RAG) - 開発リマインダー機能
  const devItem = getDevItem(app.name);
  const level = ragLevel(devItem);
  const hasAction = devItem && devItem.nextAction && devItem.nextAction.trim();
  const actionText = hasAction ? escapeHtml(devItem.nextAction) : '+ 次のアクションを記録';
  const actionClass = hasAction ? 'dev-next-action' : 'dev-next-action empty';
  const lastTouchedHtml = (devItem && devItem.lastTouchedAt && hasAction)
    ? `<span class="dev-last-touched">${formatRelative(devItem.lastTouchedAt)}</span>`
    : '';
  const statusPillHtml = (devItem && devItem.status === 'paused')
    ? `<span class="dev-status-pill paused">一時停止</span>`
    : '';
  const devStateHtml = `
    <div class="dev-state">
      <div class="dev-state-row">
        <span class="dev-rag-dot dev-rag-${level}" title="${level === 'red' ? '30日以上未更新' : level === 'amber' ? '7-30日未更新' : level === 'green' ? '直近で更新済み' : 'メモなし'}"></span>
        <span class="${actionClass}" data-app-name="${esc}" role="button" tabindex="0" aria-label="次のアクションを編集">${actionText}</span>
        ${statusPillHtml}
        ${lastTouchedHtml}
      </div>
    </div>
  `;

  card.setAttribute('role', 'article');
  card.setAttribute('aria-label', app.name);

  card.innerHTML = `
    <div class="app-icon" style="background:${app.color}" aria-hidden="true">${app.icon}</div>
    <div class="app-info">
      <div class="app-name">${app.name} ${badgeHtml}</div>
      <div class="app-desc">${app.desc}</div>
      ${metaHtml}
      ${integratedHtml}
      ${credHtml}
      ${devStateHtml}
    </div>
    <div class="app-actions">${actionsHtml}</div>
  `;

  // Wire up next-action editor click
  const naEl = card.querySelector('.dev-next-action');
  if (naEl) {
    naEl.addEventListener('click', (e) => {
      e.stopPropagation();
      openEditor(app.name);
    });
    naEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        e.stopPropagation();
        openEditor(app.name);
      }
    });
  }

  card.addEventListener('click', () => {
    // Disable card-level click on mobile to avoid conflicts with action buttons
    if (window.innerWidth <= 640) return;
    if (app.url) window.open(app.url, '_blank');
    else if (app.localUrl) window.open(app.localUrl, '_blank');
    else if (app.localCmd) {
      navigator.clipboard.writeText(app.localCmd);
      showToast('コピー済: ' + app.localCmd);
    }
  });

  return card;
}

document.getElementById('search').addEventListener('input', e => renderApps(e.target.value));

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    renderApps();
  }
});

renderApps();

// Autofocus search on desktop only (avoid mobile keyboard popup)
if (window.innerWidth > 640) {
  document.getElementById('search').focus();
}

// ============================================
// Dev State - イベントハンドラ初期化
// ============================================
document.getElementById('ed-save').addEventListener('click', saveEditor);
document.getElementById('ed-cancel').addEventListener('click', closeEditor);
document.getElementById('ed-clear').addEventListener('click', clearEditor);

document.getElementById('modal-backdrop').addEventListener('click', (e) => {
  if (e.target.id === 'modal-backdrop') closeEditor();
});

// Status radio: toggle paused-reason field & visual checked state
document.querySelectorAll('input[name="ed-status"]').forEach(r => {
  r.addEventListener('change', () => {
    document.querySelectorAll('input[name="ed-status"]').forEach(rr => {
      rr.parentElement.classList.toggle('checked', rr.checked);
    });
    document.getElementById('ed-paused-reason-field').style.display =
      (r.value === 'paused' && r.checked) ? 'flex' : 'none';
  });
});

// Enter to save in editor (when focused on next-action input)
document.getElementById('ed-next-action').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    saveEditor();
  }
});

// ESC to close modal (also reused by global handler)
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('modal-backdrop').classList.contains('show')) {
    closeEditor();
  }
});

// Export / Import
document.getElementById('btn-export').addEventListener('click', exportDevState);
document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('file-import').click();
});
document.getElementById('file-import').addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (f) importDevState(f);
  e.target.value = '';
});
</script>
</body>
</html>
