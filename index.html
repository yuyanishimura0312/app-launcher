    color: #1a1a1a;

  .header {

    max-width: 960px;

  }
  .header h1 {

    font-weight: 600;
    color: #783c28;
    letter-spacing: -0.3px;
  }
  .header p {

    color: #6b635b;
    margin-top: 4px;
  }
  .stats {
    display: flex;
    gap: 16px;
    margin-top: 12px;
  }
  .stat {
    font-size: 12px;
    color: #5c534b;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .search-bar {
    max-width: 960px;
    margin: 0 auto;
    padding: 8px 24px 16px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 16px;
    background: #fff;
    border: 1px solid #e8e2da;
    border-radius: 8px;
    color: #1a1a1a;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: #c87864; }
  .search-bar input::placeholder { color: #9a918a; }
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 48px;
  }
  .section {
    margin-bottom: 28px;
    scroll-margin-top: 52px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 0 0 10px;
    border-bottom: 1px solid #e8e2da;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .section-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-title.released { color: #2e7d32; }
  .section-title.released .section-indicator { background: #2e7d32; }
  .section-title.local { color: #96503a; }
  .section-title.local .section-indicator { background: #e65100; }
  .section-title.cli { color: #5c534b; }
  .section-title.cli .section-indicator { background: #78716c; }
  .section-title.infra { color: #475569; }
  .section-title.infra .section-indicator { background: #475569; }
  .section-title.agent { color: #7c3aed; }
  .section-title.agent .section-indicator { background: #7c3aed; }
  .section-title.archived { color: #9a918a; }
  .section-title.archived .section-indicator { background: #bbb; }
  .app-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .app-card:hover { background: #f3efe9; }
  .app-card:active { background: #ece6dd; }
  .btn:active { transform: scale(0.96); }
  .app-card.archived-card { opacity: 0.55; }
  .app-card.archived-card:hover { opacity: 0.75; }
  .app-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
  }
  .app-info { flex: 1; min-width: 0; }
  .app-name {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-name .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .badge.released {
    background: #e6f4e6;
    color: #1b5e20;
  }
  .badge.local {
    background: #fff3e0;
    color: #e65100;
  }
  .badge.cli {
    background: #f3efe9;
    color: #57534e;
  }
  .badge.infra {
    background: #e3f2fd;
    color: #1565c0;
  }
  .badge.agent {
    background: #ede9fe;
    color: #7c3aed;
  }
  .badge.dev {
    background: #fce4ec;
    color: #c62828;
  }
  .badge.archived-badge {
    background: #f0ede8;
    color: #9a918a;
  }
  .app-desc {
    font-size: 12px;
    color: #44403c;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .app-meta {
    font-size: 11px;
    color: #6b635b;
    margin-top: 2px;
  }
  .app-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    white-space: nowrap;
    min-width: 44px;
    min-height: 36px;
  }
  .btn:focus-visible {
    outline: 2px solid #783c28;
    outline-offset: 2px;
  }
  .btn-open {
    background: #783c28;
    color: #fff;
  }
  .btn-open:hover { background: #4a2418; }
  .btn-admin {
    background: #c87864;
    color: #fff;
  }
  .btn-admin:hover { background: #96503a; }
  .btn-copy {
    background: #fff;
    color: #5c534b;
    border: 1px solid #e8e2da;
  }
  .btn-copy:hover { background: #f3efe9; color: #1a1a1a; }
  .btn-copy.copied {

    color: #2e7d32;
    border-color: #a5d6a7;
  }
  .btn-archive {
    background: #fff;
    color: #9a918a;
    border: 1px solid #e8e2da;
    font-size: 11px;
    padding: 4px 8px;
  }
  .btn-archive:hover { background: #f3efe9; color: #5c534b; }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #4a2418;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .hidden { display: none !important; }
  .cred-row {
    font-size: 11px;
    color: #6b635b;
    margin-top: 2px;
  }
  .cred-row span {
    color: #5c534b;
    font-family: 'SF Mono', 'Menlo', monospace;
    background: #f3efe9;
    padding: 1px 5px;
    border-radius: 3px;
    user-select: all;
  }
  .integrated-in {
    font-size: 11px;
    color: #7c3aed;
    margin-top: 2px;
  }
  .integrated-in .app-tag {
    display: inline-block;
    background: #ede9fe;
    color: #6d28d9;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    margin-right: 4px;
  }
  .archive-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 11px;
    font-weight: 400;
    color: #9a918a;
    cursor: pointer;
  }
  .archive-toggle:hover { color: #5c534b; }

  /* Category jump nav - mobile only */
  .category-nav {
    display: none;
  }
  @media (max-width: 640px) {
    .category-nav {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(250, 248, 245, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid #e8e2da;
      scrollbar-width: none;
    }
    .category-nav::-webkit-scrollbar { display: none; }
    .category-nav button {
      white-space: nowrap;
      padding: 6px 12px;
      border-radius: 16px;
      border: 1px solid #e8e2da;
      background: #fff;
      font-size: 11px;
      font-weight: 500;
      color: #5c534b;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 32px;
    }
    .category-nav button:active,
    .category-nav button.active {
      background: #783c28;
      color: #fff;
      border-color: #783c28;
    }
  }

  /* ============================================
     Responsive Design
     ============================================ */

  /* --- Tablet & small desktop (max 768px) --- */
  @media (max-width: 768px) {
    .app-desc {
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .app-actions {
      flex-wrap: wrap;
      gap: 6px;
    }
  }

  /* --- Mobile (max 640px) --- */
  @media (max-width: 640px) {
    .header {
      padding: 20px 16px 12px;
    }
    .header h1 { font-size: 18px; }
    .header p { font-size: 12px; }
    .stats {
      flex-wrap: wrap;
      gap: 6px 12px;
    }
    .stat { font-size: 11px; }
    .search-bar {
      padding: 8px 16px 12px;
    }
    .search-bar input {
      font-size: 16px; /* prevent iOS auto-zoom on focus */
      padding: 10px 14px;
    }
    .container {
      padding: 0 12px 32px;
    }
    .section { margin-bottom: 20px; }
    .section-title { font-size: 11px; }

    /* Card: icon left (absolute), info + actions stacked right */
    .app-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 12px 12px 12px 54px;
      gap: 6px;
      border-radius: 8px;
      cursor: default;
      -webkit-tap-highlight-color: transparent;
    }
    .app-icon {
      position: absolute;
      left: 10px;
      top: 12px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      border-radius: 8px;
    }
    .app-info {
      width: 100%;
      min-width: 0;
      flex: none;
    }
    .app-name { font-size: 13px; gap: 6px; }
    .app-name .badge { font-size: 9px; padding: 1px 5px; }
    .app-desc {
      font-size: 11px;
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .app-meta { font-size: 10px; }

    /* Actions: full width, wrap */
    .app-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      width: 100%;
      flex-shrink: 1;
    }
    .btn {
      padding: 7px 12px;
      font-size: 12px;
      min-height: 36px;
      border-radius: 6px;
    }
    .btn-archive {
      font-size: 10px;
      padding: 5px 8px;
      min-height: 30px;
      min-width: auto;
      opacity: 0.5;
      margin-left: auto;
    }

    /* Extra info rows */
    .cred-row { font-size: 10px; }
    .integrated-in { font-size: 10px; }
    .integrated-in .app-tag { font-size: 9px; }

    /* Toast at bottom, avoid overlap with thumb zone */
    .toast {
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      font-size: 12px;
      padding: 8px 16px;
      max-width: calc(100vw - 32px);
    }
  }

  /* --- Narrow mobile (max 380px) --- */
  @media (max-width: 380px) {
    .header { padding: 16px 12px 10px; }
    .search-bar { padding: 6px 12px 10px; }
    .container { padding: 0 8px 24px; }

    .app-card {
      padding: 10px 10px 10px 44px;
    }
    .app-icon {
      left: 8px;
      top: 10px;
      width: 30px;
      height: 30px;
      font-size: 13px;
    }
    .app-name { font-size: 12px; }
    .app-desc { font-size: 11px; -webkit-line-clamp: 1; }
    .app-meta { display: none; }
    .btn { padding: 6px 8px; font-size: 11px; min-height: 34px; min-width: 36px; }
    .btn-archive { padding: 5px 8px; font-size: 10px; min-height: 30px; }
  }
</style>
</head>

// --- Archive state persistence ---
const STORAGE_KEY = 'app-launcher-archived';

function loadArchivedSet() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return new Set(JSON.parse(saved));
  } catch (e) {}
  // Initialize with default archived apps
  const defaults = new Set();
  apps.forEach(app => { if (app.defaultArchived) defaults.add(app.name); });
  return defaults;
}

function saveArchivedSet(set) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
}

let archivedSet = loadArchivedSet();

function toggleArchive(appName) {
  if (archivedSet.has(appName)) {
    archivedSet.delete(appName);
  } else {
    archivedSet.add(appName);
  }
  saveArchivedSet(archivedSet);
  renderApps(document.getElementById('search').value);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyCmd(cmd, btn) {
  navigator.clipboard.writeText(cmd).then(() => {
    btn.classList.add('copied');
    btn.textContent = 'コピー済';
    showToast('コピー済: ' + cmd);
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'コピー'; }, 2000);
  });
}

function renderApps(filter = '') {
  const container = document.getElementById('app-list');
  container.innerHTML = '';
  const lf = filter.toLowerCase();

  // Split apps into active and archived
  const activeCategories = {};
  const activeCategoryMeta = {};
  const archivedApps = [];

  apps.forEach(app => {
    if (lf && !app.name.toLowerCase().includes(lf) && !app.desc.toLowerCase().includes(lf) && !app.category.toLowerCase().includes(lf)) return;

    if (archivedSet.has(app.name)) {
      archivedApps.push(app);
    } else {
      if (!activeCategories[app.category]) {
        activeCategories[app.category] = [];
        activeCategoryMeta[app.category] = app.sectionType;
      }
      activeCategories[app.category].push(app);
    }
  });

  // Build category nav for mobile
  const nav = document.getElementById('category-nav');
  nav.innerHTML = '';
  const catKeys = Object.keys(activeCategories);
  catKeys.forEach((cat, i) => {
    const btn = document.createElement('button');
    // Short labels for nav
    const shortLabels = {
      '公開中の Web アプリ': '公開中',
      'ローカル Web アプリ': 'ローカル',
      'CLI ツール': 'CLI',
      '共有インフラ': '基盤',
      '調査・リサーチ': '調査',
      '経営・日常業務': '経営',
      '開発・品質・デザイン': '開発',
      'コンテンツ・ユーティリティ': 'コンテンツ',
      '研究エージェント': '研究'
    };
    btn.textContent = shortLabels[cat] || cat;
    btn.addEventListener('click', () => {
      const target = document.getElementById('section-' + i);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    nav.appendChild(btn);
  });

  // Render active categories
  Object.entries(activeCategories).forEach(([cat, items], i) => {
    const section = document.createElement('div');
    section.className = 'section';
    section.id = 'section-' + i;
    const sectionType = activeCategoryMeta[cat] || '';
    const count = items.length;
    const shareLink = sectionType === 'agent'
      ? ` <a href="https://yuyanishimura0312.github.io/claude-agent-share/" target="_blank" style="font-size:11px;font-weight:400;color:#7c3aed;text-decoration:underline;margin-left:auto">カタログ / シェア</a>`
      : '';
    section.innerHTML = `<div class="section-title ${sectionType}"><span class="section-indicator"></span>${cat} <span style="font-weight:400;opacity:0.6">(${count})</span>${shareLink}</div>`;
    items.forEach(app => section.appendChild(buildCard(app, false)));
    container.appendChild(section);
  });

  // Render archived section
  if (archivedApps.length > 0) {
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<div class="section-title archived"><span class="section-indicator"></span>アーカイブ済み <span style="font-weight:400;opacity:0.6">(${archivedApps.length})</span></div>`;
    archivedApps.forEach(app => section.appendChild(buildCard(app, true)));
    container.appendChild(section);
  }

  if (Object.keys(activeCategories).length === 0 && archivedApps.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#666;padding:40px">該当するアプリが見つかりません</p>';
  }
}

function buildCard(app, isArchived) {
  const card = document.createElement('div');
  card.className = isArchived ? 'app-card archived-card' : 'app-card';

  let credHtml = '';
  if (app.localNote) credHtml += `<div class="cred-row">${app.localNote}</div>`;

  let metaHtml = '';
  if (app.hosting) metaHtml = `<div class="app-meta">${app.hosting}</div>`;

  const esc = app.name.replace(/"/g, '&quot;');
  let actionsHtml = '';
  if (app.url) {
    actionsHtml += `<a href="${app.url}" target="_blank" class="btn btn-open" aria-label="${esc} を開く" onclick="event.stopPropagation()">開く</a>`;
  }
  if (app.localUrl && !app.url) {
    actionsHtml += `<a href="${app.localUrl}" target="_blank" class="btn btn-open" aria-label="${esc} を開く" onclick="event.stopPropagation()">開く</a>`;
  }
  if (app.admin) {
    actionsHtml += `<a href="${app.admin}" target="_blank" class="btn btn-admin" aria-label="${esc} の管理画面" onclick="event.stopPropagation()">管理</a>`;
  }
  if (app.setup) {
    actionsHtml += `<a href="${app.setup}" target="_blank" class="btn btn-admin" aria-label="${esc} のセットアップ" onclick="event.stopPropagation()" style="background:#5a6b7a">Setup</a>`;
  }
  if (app.localCmd) {
    actionsHtml += `<button class="btn btn-copy" aria-label="${esc} のコマンドをコピー" onclick="event.stopPropagation(); copyCmd('${app.localCmd.replace(/'/g, "\\'")}', this)">コピー</button>`;
  }
  if (app.pestle) {
    actionsHtml += `<button class="btn btn-copy" aria-label="${esc} のPESTLEコマンドをコピー" onclick="event.stopPropagation(); copyCmd('${app.pestle.replace(/'/g, "\\'")}', this)" title="PESTLE mode">PESTLE</button>`;
  }

  // Archive/restore toggle
  const archiveBtnLabel = isArchived ? '復元' : 'アーカイブ';
  actionsHtml += `<button class="btn btn-archive" aria-label="${esc} を${archiveBtnLabel}" onclick="event.stopPropagation(); toggleArchive('${app.name.replace(/'/g, "\\'")}')">${archiveBtnLabel}</button>`;

  const badgeHtml = isArchived
    ? `<span class="badge archived-badge">アーカイブ</span>`
    : `<span class="badge ${app.badgeType}">${app.badge}</span>`;

  let integratedHtml = '';
  if (app.integratedIn && app.integratedIn.length > 0) {
    const tags = app.integratedIn.map(a => `<span class="app-tag">${a}</span>`).join('');
    integratedHtml = `<div class="integrated-in">組込先: ${tags}</div>`;
  }

  card.setAttribute('role', 'article');
  card.setAttribute('aria-label', app.name);

  card.innerHTML = `
    <div class="app-icon" style="background:${app.color}" aria-hidden="true">${app.icon}</div>
    <div class="app-info">
      <div class="app-name">${app.name} ${badgeHtml}</div>
      <div class="app-desc">${app.desc}</div>
      ${metaHtml}
      ${integratedHtml}
      ${credHtml}
    </div>
    <div class="app-actions">${actionsHtml}</div>
  `;

  card.addEventListener('click', () => {
    // Disable card-level click on mobile to avoid conflicts with action buttons
    if (window.innerWidth <= 640) return;
    if (app.url) window.open(app.url, '_blank');
    else if (app.localUrl) window.open(app.localUrl, '_blank');
    else if (app.localCmd) {
      navigator.clipboard.writeText(app.localCmd);
      showToast('コピー済: ' + app.localCmd);
    }
  });

  return card;
}

document.getElementById('search').addEventListener('input', e => renderApps(e.target.value));

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    renderApps();
  }
});

renderApps();

// Autofocus search on desktop only (avoid mobile keyboard popup)
if (window.innerWidth > 640) {
  document.getElementById('search').focus();
}
</script>
