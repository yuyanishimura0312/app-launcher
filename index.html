<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Launcher</title>
<link rel="icon" href="https://esse-sense.com/favicon.ico">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #faf8f5;
    color: #1a1a1a;
    min-height: 100vh;
  }
  .header {
    padding: 32px 24px 16px;
    max-width: 960px;
    margin: 0 auto;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #783c28;
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 13px;
    color: #9a918a;
    margin-top: 4px;
  }
  .search-bar {
    max-width: 960px;
    margin: 0 auto;
    padding: 8px 24px 16px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 16px;
    background: #fff;
    border: 1px solid #e8e2da;
    border-radius: 8px;
    color: #1a1a1a;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: #c87864; }
  .search-bar input::placeholder { color: #9a918a; }
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 48px;
  }
  .section {
    margin-bottom: 28px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #96503a;
    padding: 0 0 10px;
    border-bottom: 1px solid #e8e2da;
    margin-bottom: 8px;
  }
  .app-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .app-card:hover { background: #f3efe9; }
  .app-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
  }
  .app-info { flex: 1; min-width: 0; }
  .app-name {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-name .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 4px;
    background: #e6f4e6;
    color: #2e7d32;
  }
  .app-name .badge.local {
    background: #fff3e0;
    color: #e65100;
  }
  .app-name .badge.dev {
    background: #e3f2fd;
    color: #1565c0;
  }
  .app-desc {
    font-size: 12px;
    color: #5c534b;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .app-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .btn-open {
    background: #783c28;
    color: #fff;
  }
  .btn-open:hover { background: #4a2418; }
  .btn-admin {
    background: #c87864;
    color: #fff;
  }
  .btn-admin:hover { background: #96503a; }
  .btn-copy {
    background: #fff;
    color: #5c534b;
    border: 1px solid #e8e2da;
  }
  .btn-copy:hover { background: #f3efe9; color: #1a1a1a; }
  .btn-copy.copied {
    background: #e6f4e6;
    color: #2e7d32;
    border-color: #a5d6a7;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #4a2418;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .hidden { display: none !important; }
  .cred-row {
    font-size: 11px;
    color: #9a918a;
    margin-top: 2px;
  }
  .cred-row span {
    color: #5c534b;
    font-family: 'SF Mono', 'Menlo', monospace;
    background: #f3efe9;
    padding: 1px 5px;
    border-radius: 3px;
    user-select: all;
  }
</style>
</head>
<body>

<div class="header">
  <h1>App Launcher</h1>
  <p>Claude Code Apps - Quick Access</p>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search apps..." autofocus>
</div>

<div class="container" id="app-list"></div>
<div class="toast" id="toast"></div>

<script>
const apps = [
  // Web Apps (Public)
  {
    category: "Web Apps",
    name: "PR Generator",
    desc: "AI press release generator for PR Times (esse-sense)",
    icon: "PR", color: "#7c3aed",
    url: "https://pr-generator-public.vercel.app",
    admin: "https://pr-generator-public.vercel.app/admin",
    adminPw: "essense2026",
    badge: "public", badgeType: ""
  },
  {
    category: "Web Apps",
    name: "Essence CRM",
    desc: "Kanban-style sales management with analytics",
    icon: "CR", color: "#2563eb",
    url: "https://essence-crm.vercel.app",
    admin: "https://essence-crm.vercel.app/login",
    adminNote: "Email/PW auth (initial setup creates admin)",
    badge: "public", badgeType: ""
  },
  {
    category: "Web Apps",
    name: "Miratuku Membership",
    desc: "Membership site + CRM with Stripe payments",
    icon: "MM", color: "#059669",
    url: null,
    localCmd: "cd ~/miratuku-membership && npm run dev",
    localUrl: "http://localhost:3000",
    admin: "http://localhost:3000/admin/login",
    adminPw: "miratuku2026",
    stripeTest: "4242 4242 4242 4242",
    badge: "dev", badgeType: "dev"
  },
  // Foresight & Research
  {
    category: "Foresight & Research",
    name: "Future Insight App",
    desc: "PESTLE / CLA / Weak signals / Scenario generation",
    icon: "FI", color: "#0891b2",
    url: "https://yuyanishimura0312.github.io/future-insight-app/",
    badge: "public", badgeType: ""
  },
  {
    category: "Foresight & Research",
    name: "Future Insight Workspace",
    desc: "Multi-user foresight workspace with Firebase Auth",
    icon: "FW", color: "#0e7490",
    url: "https://yuyanishimura0312.github.io/future-insight-workspace/",
    badge: "public", badgeType: ""
  },
  {
    category: "Foresight & Research",
    name: "Research Dashboard",
    desc: "Research results dashboard with semantic search",
    icon: "RD", color: "#6366f1",
    url: "https://yuyanishimura0312.github.io/research-dashboard/",
    badge: "public", badgeType: ""
  },
  {
    category: "Foresight & Research",
    name: "Research Agents",
    desc: "5-agent AI research team + 8-agent PESTLE mode",
    icon: "RA", color: "#8b5cf6",
    localCmd: 'cd ~/research-agents && python research_team.py "theme"',
    pestle: 'cd ~/research-agents && python pestle_team.py "theme"',
    badge: "cli", badgeType: "local"
  },
  // Local Tools
  {
    category: "Local Tools",
    name: "Expense Checker",
    desc: "CSV expense review with auto-flagging",
    icon: "EC", color: "#d97706",
    localCmd: "open ~/expense-checker/src/index.html",
    badge: "local", badgeType: "local"
  },
  {
    category: "Local Tools",
    name: "Press Release Generator (Streamlit)",
    desc: "Original PR Times generator prototype",
    icon: "PG", color: "#9333ea",
    localCmd: "cd ~/press-release-generator && streamlit run app.py",
    localUrl: "http://localhost:8501",
    badge: "local", badgeType: "local"
  },
  {
    category: "Local Tools",
    name: "Genesia TRL App",
    desc: "Business-researcher matching with TRL scoring",
    icon: "GT", color: "#dc2626",
    localCmd: "cd ~/genesia-trl-app && streamlit run app.py",
    localUrl: "http://localhost:8501",
    badge: "local", badgeType: "local"
  },
  {
    category: "Local Tools",
    name: "Mail Contacts Manager",
    desc: "Extract contacts from macOS Mail.app (20,000+ emails)",
    icon: "MC", color: "#ea580c",
    url: "http://localhost:5050",
    localNote: "Auto-starts via launchd",
    badge: "local", badgeType: "local"
  },
  {
    category: "Local Tools",
    name: "Contract Generator",
    desc: "Auto-generate contracts from Google Sheets data",
    icon: "CG", color: "#78716c",
    localCmd: "cd ~/contract-generator && python main.py",
    badge: "cli", badgeType: "local"
  },
  // Shared Infrastructure
  {
    category: "Shared Infrastructure",
    name: "Email System",
    desc: "Shared email delivery (SendGrid) for CRM + Mail Contacts",
    icon: "ES", color: "#475569",
    localCmd: "code ~/email-system",
    badge: "infra", badgeType: "local"
  },
  {
    category: "Shared Infrastructure",
    name: "Stripe Payment Kit",
    desc: "Reusable Stripe templates (subscription / one-time / portal)",
    icon: "SK", color: "#635bff",
    localCmd: "code ~/stripe-payment-kit",
    stripeTest: "4242 4242 4242 4242",
    badge: "infra", badgeType: "local"
  },
];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyCmd(cmd, btn) {
  navigator.clipboard.writeText(cmd).then(() => {
    btn.classList.add('copied');
    btn.textContent = 'Copied';
    showToast('Copied: ' + cmd);
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 2000);
  });
}

function renderApps(filter = '') {
  const container = document.getElementById('app-list');
  container.innerHTML = '';
  const lf = filter.toLowerCase();
  const categories = {};

  apps.forEach(app => {
    if (lf && !app.name.toLowerCase().includes(lf) && !app.desc.toLowerCase().includes(lf) && !app.category.toLowerCase().includes(lf)) return;
    if (!categories[app.category]) categories[app.category] = [];
    categories[app.category].push(app);
  });

  Object.entries(categories).forEach(([cat, items]) => {
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<div class="section-title">${cat}</div>`;

    items.forEach(app => {
      const card = document.createElement('div');
      card.className = 'app-card';

      const badgeClass = app.badgeType === 'local' ? 'local' : app.badgeType === 'dev' ? 'dev' : '';
      let credHtml = '';
      if (app.adminPw) credHtml += `<div class="cred-row">PW: <span>${app.adminPw}</span></div>`;
      if (app.adminNote) credHtml += `<div class="cred-row">${app.adminNote}</div>`;
      if (app.stripeTest) credHtml += `<div class="cred-row">Test card: <span>${app.stripeTest}</span></div>`;
      if (app.localNote) credHtml += `<div class="cred-row">${app.localNote}</div>`;

      let actionsHtml = '';
      if (app.url) {
        actionsHtml += `<a href="${app.url}" target="_blank" class="btn btn-open" onclick="event.stopPropagation()">Open</a>`;
      }
      if (app.localUrl && !app.url) {
        actionsHtml += `<a href="${app.localUrl}" target="_blank" class="btn btn-open" onclick="event.stopPropagation()">Open</a>`;
      }
      if (app.admin) {
        actionsHtml += `<a href="${app.admin}" target="_blank" class="btn btn-admin" onclick="event.stopPropagation()">Admin</a>`;
      }
      if (app.localCmd) {
        actionsHtml += `<button class="btn btn-copy" onclick="event.stopPropagation(); copyCmd('${app.localCmd.replace(/'/g, "\\'")}', this)">Copy</button>`;
      }
      if (app.pestle) {
        actionsHtml += `<button class="btn btn-copy" onclick="event.stopPropagation(); copyCmd('${app.pestle.replace(/'/g, "\\'")}', this)" title="PESTLE mode">PESTLE</button>`;
      }

      card.innerHTML = `
        <div class="app-icon" style="background:${app.color}">${app.icon}</div>
        <div class="app-info">
          <div class="app-name">${app.name} <span class="badge ${badgeClass}">${app.badge}</span></div>
          <div class="app-desc">${app.desc}</div>
          ${credHtml}
        </div>
        <div class="app-actions">${actionsHtml}</div>
      `;

      // Click entire card to open
      card.addEventListener('click', () => {
        if (app.url) window.open(app.url, '_blank');
        else if (app.localUrl) window.open(app.localUrl, '_blank');
        else if (app.localCmd) {
          navigator.clipboard.writeText(app.localCmd);
          showToast('Copied: ' + app.localCmd);
        }
      });

      section.appendChild(card);
    });

    container.appendChild(section);
  });

  if (Object.keys(categories).length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#666;padding:40px">No apps found</p>';
  }
}

document.getElementById('search').addEventListener('input', e => renderApps(e.target.value));

// Keyboard shortcut: Cmd+K to focus search
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  // Escape to clear search
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    renderApps();
  }
});

renderApps();
</script>
</body>
</html>
